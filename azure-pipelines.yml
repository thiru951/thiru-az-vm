trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
- group: kv-secrets

steps:

- task: TerraformInstaller@1
  inputs:
    terraformVersion: 'latest'

- script: |
    terraform init
  displayName: Terraform Init

- script: |
    terraform plan -var="vm_password=$(vm_password)"
  displayName: Terraform Plan

- script: |
    terraform apply -auto-approve -var="vm_password=$(vm_password)"
  displayName: Terraform Apply