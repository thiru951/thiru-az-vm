trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
- group: kv-secrets

steps:

- task: TerraformToolInstaller@0
  inputs:
    terraformVersion: '1.6.6'

# ✅ Azure login using YOUR service connection
- task: AzureCLI@2
  inputs:
    azureSubscription: 'thiru-service-connection'
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    inlineScript: |
      echo "Azure login successful"
      az account show

- script: |
    terraform init
  displayName: Terraform Init

- script: |
    terraform plan -var="vm_password=$(vm_password)"
  displayName: Terraform Plan

- script: |
    terraform apply -auto-approve -var="vm_password=$(vm_password)"
  displayName: Terraform Apply