trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
- group: kv-secrets

steps:

# Install Terraform
- script: |
    sudo apt-get update
    sudo apt-get install -y unzip wget
    wget https://releases.hashicorp.com/terraform/1.6.6/terraform_1.6.6_linux_amd64.zip
    unzip terraform_1.6.6_linux_amd64.zip
    sudo mv terraform /usr/local/bin/
    terraform version
  displayName: Install Terraform

# Terraform Init (IMPORTANT FIX)
- script: |
    terraform init -reconfigure \
      -backend-config="resource_group_name=YOUR_STORAGE_RG" \
      -backend-config="storage_account_name=thiruterraformstate123" \
      -backend-config="container_name=tfstate" \
      -backend-config="key=terraform.tfstate"
  displayName: Terraform Init

# Terraform Plan
- script: |
    terraform plan -var="vm_password=$(vm_password)"
  displayName: Terraform Plan

# Terraform Apply
- script: |
    terraform apply -auto-approve -var="vm_password=$(vm_password)"
  displayName: Terraform Apply