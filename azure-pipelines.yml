trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
- group: kv-secrets

steps:

# Install Terraform
- task: TerraformInstaller@1
  inputs:
    terraformVersion: '1.6.6'

# Terraform INIT (with backend config)
- task: TerraformTaskV4@4
  displayName: Terraform Init
  inputs:
    provider: 'azurerm'
    command: 'init'
    backendServiceArm: 'azure-subscription-conn'
    backendAzureRmResourceGroupName: 'tfstate-rg-india'
    backendAzureRmStorageAccountName: 'tfstate12345india'
    backendAzureRmContainerName: 'tfstate'
    backendAzureRmKey: 'terraform.tfstate'

# Terraform PLAN
- task: TerraformTaskV4@4
  displayName: Terraform Plan
  inputs:
    provider: 'azurerm'
    command: 'plan'
    environmentServiceNameAzureRM: 'azure-subscription-conn'
    commandOptions: '-var="vm_password=$(vm_password)"'

# Terraform APPLY
- task: TerraformTaskV4@4
  displayName: Terraform Apply
  inputs:
    provider: 'azurerm'
    command: 'apply'
    environmentServiceNameAzureRM: 'azure-subscription-conn'
    commandOptions: '-auto-approve -var="vm_password=$(vm_password)"'