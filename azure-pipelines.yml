trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
- group: kv-secrets

steps:

# Install Terraform
- script: |
    sudo apt-get update
    sudo apt-get install -y unzip wget
    wget https://releases.hashicorp.com/terraform/1.6.6/terraform_1.6.6_linux_amd64.zip
    unzip terraform_1.6.6_linux_amd64.zip
    sudo mv terraform /usr/local/bin/
    terraform version
  displayName: Install Terraform

# Terraform Init
- script: |
    terraform init
  displayName: Terraform Init
  env:
    ARM_USE_CLI: "false"

# Terraform Plan
- script: |
    terraform plan -var="vm_password=$VM_PASSWORD"
  displayName: Terraform Plan
  env:
    VM_PASSWORD: $(vm_password)
    ARM_USE_CLI: "false"

# Terraform Apply
- script: |
    terraform apply -auto-approve -var="vm_password=$VM_PASSWORD"
  displayName: Terraform Apply
  env:
    VM_PASSWORD: $(vm_password)
    ARM_USE_CLI: "false"