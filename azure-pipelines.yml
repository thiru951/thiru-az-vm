trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
- group: kv-secrets

steps:

# Install Terraform
- script: |
    sudo apt-get update
    sudo apt-get install -y unzip wget
    wget https://releases.hashicorp.com/terraform/1.6.6/terraform_1.6.6_linux_amd64.zip
    unzip terraform_1.6.6_linux_amd64.zip
    sudo mv terraform /usr/local/bin/
    terraform version
  displayName: Install Terraform

# 🔥 IMPORTANT: USE AZURE LOGIN TASK (NOT SCRIPT)
- task: AzureCLI@2
  inputs:
    azureSubscription: 'azure-subscription-conn'
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      echo "Logged in via Service Connection"

      # Terraform MUST inherit this context
      export ARM_USE_CLI=false

      terraform init -input=false
      terraform plan -var="vm_password=$(vm_password)"
      terraform apply -auto-approve -var="vm_password=$(vm_password)"
  displayName: Terraform Deploy